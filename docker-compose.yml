services:
  postgres:
    image: postgres:16
    container_name: kernreactor_postgres
    restart: always
    environment:
      POSTGRES_USER: nuclear_user
      POSTGRES_PASSWORD: nuclear_password
      POSTGRES_DB: nuclear_source
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../data:/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nuclear_user -d nuclear_source"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-init:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: nuclear_password
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        psql -h postgres -U nuclear_user -d postgres -v ON_ERROR_STOP=1 <<'SQL'
        SELECT 'CREATE ROLE airflow WITH LOGIN PASSWORD ''airflow_password'''
        WHERE NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'airflow')\gexec
        SELECT 'CREATE DATABASE airflow OWNER airflow'
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'airflow')\gexec
        SQL
        psql -h postgres -U nuclear_user -d nuclear_source -v ON_ERROR_STOP=1 <<'SQL'
        CREATE SCHEMA IF NOT EXISTS raw;
        GRANT CONNECT ON DATABASE nuclear_source TO airflow;
        GRANT CREATE ON DATABASE nuclear_source TO airflow;
        GRANT USAGE, CREATE ON SCHEMA raw TO airflow;
        GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA raw TO airflow;
        ALTER DEFAULT PRIVILEGES IN SCHEMA raw GRANT ALL ON TABLES TO airflow;
        SQL
    restart: "no"

  airflow:
    image: apache/airflow:2.8.1-python3.10
    restart: always
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow_password@postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=EXAMPLE_FERNET_KEY
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW_CONN_POSTGRES_NUCLEAR=postgresql+psycopg2://nuclear_user:nuclear_password@postgres:5432/nuclear_source
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/init.sh:/opt/airflow/init.sh
      - ./scripts:/opt/airflow/scripts
      - ../data:/data
    ports:
      - "8081:8080"
    entrypoint: ["/bin/bash", "/opt/airflow/init.sh"]

volumes:
  postgres_data:
